name: Purge jsDelivr CDN

on:
  push:
    branches:
      - main
    paths:
      - '**/*.webp'
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Modified WebP Files
        uses: actions/github-script@v7
        with:
          script: |
            const before = context.payload.before;
            const after = context.payload.after;

            let modifiedFiles = [];

            // For workflow_dispatch or other unexpected events where before/after aren't available
            if (!before || !after || before === '0000000000000000000000000000000000000000') {
              console.log("No before/after commit info available. Checking payload commits instead.");
              const commits = context.payload.commits;
              if (commits) {
                const fileSet = new Set();
                for (const commit of commits) {
                  for (const file of commit.modified) {
                    if (file.endsWith('.webp')) {
                      fileSet.add(file);
                    }
                  }
                }
                modifiedFiles = Array.from(fileSet);
              } else {
                console.log("Could not determine modified files.");
                return;
              }
            } else {
              const response = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: before,
                head: after,
              });

              const files = response.data.files || [];
              modifiedFiles = files
                .filter(f => f.status === 'modified' && f.filename.endsWith('.webp'))
                .map(f => f.filename);
            }

            if (modifiedFiles.length === 0) {
              console.log("No modified .webp files found to purge.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref ? context.ref.replace('refs/heads/', '') : 'main';

            for (const file of modifiedFiles) {
              const url = `https://purge.jsdelivr.net/gh/${owner}/${repo}@${branch}/${file}`;
              console.log(`Sending purge request for: ${file}`);
              try {
                const res = await fetch(url);
                const text = await res.text();
                if (res.ok) {
                  console.log(`✅ Successfully purged: ${file}`);
                  console.log(`   Response: ${text}`);
                } else {
                  console.error(`❌ Failed to purge: ${file} (HTTP ${res.status})`);
                  console.error(`   Response: ${text}`);
                }
              } catch (error) {
                console.error(`❌ Error purging ${file}: ${error.message}`);
              }
            }
